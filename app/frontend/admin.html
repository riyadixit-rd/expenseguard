<!DOCTYPE html>
<html>

<head>
<title>Admin Panel</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 40px;
    border-radius: 12px;
    width: 500px;
}

input {
    padding: 10px;
    border-radius: 6px;
    border: none;
    margin-right: 10px;
    width: 200px;
}

button {
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.logout {
    background: red;
    color: white;
}

.dashboard {
    background: green;
    color: white;
}

.add {
    background: #3b82f6;
    color: white;
    margin-top: 10px;
}
</style>

</head>

<body>

<div class="card">

<h1>Admin Panel</h1>

<button class="logout" onclick="logout()">Logout</button>
<button class="dashboard" onclick="goDashboard()">Continue to Dashboard</button>

<h2>Add Employee</h2>

<input id="name" placeholder="Employee Name">
<input id="salary" placeholder="Salary">

<br><br>

<button class="add" onclick="addEmployee()">Add Employee</button>

<h3>Employee List</h3>

<ul id="list"></ul>

</div>

<script>

const API = "https://expenseguard-api.onrender.com";

// logout
function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

// go dashboard
function goDashboard(){
    window.location.href = "dashboard.html";
}

// ✅ FIXED FUNCTION ONLY
async function addEmployee(){

    let name = document.getElementById("name").value;
    let salary = document.getElementById("salary").value;

    try {
        let res = await fetch(API + "/add_expense", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                name: name,
                amount: salary,
                category: "Admin"
            })
        });

        let data = await res.json();

        alert("Employee Added Successfully");

    } catch (error) {
        alert("Error adding employee");
        console.log(error);
    }

}

</script>

</body>
</html>
