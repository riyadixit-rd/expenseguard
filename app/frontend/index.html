<!DOCTYPE html>
<html>

<head>
<title>ExpenseGuard Login</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(120deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#0078d4;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#005a9e;
}
</style>

</head>

<body>

<div class="card">

<h2>ExpenseGuard Login</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

async function login(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

let res = await fetch(
"https://expenseguard-api.onrender.com/login",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:username,
password:password
})
}
);

let data = await res.json();

if(data.status=="success"){

localStorage.setItem("user", data.username);
localStorage.setItem("role", data.role);


// 🔥 ROLE BASED REDIRECT
if(data.role === "admin"){
window.location.href = "admin.html";
}
else{
window.location.href = "dashboard.html";
}

}
else{
alert("Invalid login");
}

}

</script>

</body>

</html>
