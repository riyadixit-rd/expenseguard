<!DOCTYPE html>
<html>

<head>
<title>ExpenseGuard Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color: white;
}

.container {
    padding: 30px;
}

.cards {
    display: flex;
    gap: 20px;
    margin: 20px 0;
}

.card {
    flex: 1;
    background: #1e293b;
    padding: 20px;
    border-radius: 10px;
}

input, select {
    padding: 10px;
    border-radius: 6px;
    border: none;
    margin-right: 10px;
}

button {
    padding: 10px 15px;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

table {
    width: 100%;
    margin-top: 20px;
    border-collapse: collapse;
}

th, td {
    padding: 10px;
    border-bottom: 1px solid #334155;
    text-align: left;
}

.safe { color: lightgreen; }
.fraud { color: red; }

.topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
</style>

</head>

<body>

<div class="container">

<div class="topbar">
    <h1>ExpenseGuard Dashboard</h1>
    <button onclick="logout()">Logout</button>
</div>

<h3>Welcome <span id="user"></span></h3>

<div class="cards">
    <div class="card">
        <h2 id="total">0</h2>
        <p>Total Expenses</p>
    </div>

    <div class="card">
        <h2 id="fraud">0</h2>
        <p>Total Fraud</p>
    </div>

    <div class="card">
        <h2 id="safe">0</h2>
        <p>Normal Expenses</p>
    </div>
</div>

<h3>Add Expense</h3>

<input id="name" placeholder="Employee Name">
<input id="amount" type="number" placeholder="Amount">

<select id="category">
    <option>Food</option>
    <option>Travel</option>
    <option>Hotel</option>
</select>

<button onclick="addExpense()">Add Expense</button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Employee</th>
<th>Amount</th>
<th>Category</th>
<th>Fraud Score</th>
<th>Status</th>
</tr>
</thead>

<tbody id="table"></tbody>
</table>

</div>

<script>

const API = "https://expenseguard-api.onrender.com";

// show username
document.getElementById("user").innerText =
localStorage.getItem("user");

// logout
function logout(){
    localStorage.clear();
    window.location.href = "index.html";
}

// load data
async function loadData(){

    let res = await fetch(API + "/expenses");
    let data = await res.json();

    let table = document.getElementById("table");
    table.innerHTML = "";

    let total = 0, fraud = 0, safe = 0;

    data.forEach(exp => {

        total++;

        if(exp.status === "Fraud") fraud++;
        else safe++;

        let row = document.createElement("tr");

        row.innerHTML = `
        <td>${exp.id}</td>
        <td>${exp.name}</td>
        <td>${exp.amount}</td>
        <td>${exp.category}</td>
        <td>${exp.score}</td>
        <td class="${exp.status === 'Fraud' ? 'fraud' : 'safe'}">
        ${exp.status}
        </td>
        `;

        table.appendChild(row);

    });

    document.getElementById("total").innerText = total;
    document.getElementById("fraud").innerText = fraud;
    document.getElementById("safe").innerText = safe;

}

// add expense
async function addExpense(){

    let name = document.getElementById("name").value;
    let amount = document.getElementById("amount").value;
    let category = document.getElementById("category").value;

    await fetch(API + "/add_expense", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            name: name,
            amount: amount,
            category: category
        })
    });

    loadData();

}

// init
loadData();

</script>

</body>
</html>
